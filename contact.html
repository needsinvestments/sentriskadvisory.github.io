<!DOCTYPE html>
<html>
<head>
  <title>Contact - Sent Risk Advisory</title>
  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      padding:40px;
    }

    input, textarea {
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:20px;
      border-radius:5px;
      border:none;
    }

    button {
      background:#2563eb;
      color:white;
      padding:10px 20px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>Contact Us</h1>

<form action="mailto:info@sent.co.in" method="post" enctype="text/plain">

  <label>Name</label>
  <input type="text" name="name" required>

  <label>Email</label>
  <input type="email" name="email" required>

  <label>Business Requirement</label>
  <textarea name="message" rows="5" required></textarea>

  <button type="submit">Submit</button>

</form>

</body>
</html>
